# process-compose orchestration for a 3-peer pgman-proxy + PostgreSQL 18
# development cluster.
#
# Topology (one container per peer; pgman-proxy + pg18 share each
# container, mirroring tests/integration/docker-compose.test.yml):
#
#   builder ─►  pgman-proxy:dev image (multi-stage build off the
#               integration Dockerfile; bundles the pgman-proxy binary
#               into a postgres:18-bookworm base so libpq, pg_basebackup
#               and friends are colocated with their shared-lib closure)
#   network ─►  pgman-pc-net  (docker network — peer DNS happens here)
#                                  │
#       ┌──node-a (container)──┐  ┌──node-b──┐  ┌──node-c──┐
#       │ pgman-proxy (PID 1)  │  │  same    │  │  same    │
#       │ pg18 (managed by     │  │          │  │          │
#       │   pg-manager)        │  │          │  │          │
#       │ proxy :6432 →:16432  │  │  →:16433 │  │  →:16434 │
#       │ obs   :9090 →:19090  │  │  →:19091 │  │  →:19092 │
#       │ ctrl  :9091 →:19191  │  │  →:19192 │  │  →:19193 │
#       │ NATS  :4222 (intra)  │  │          │  │          │
#       │ route :6222 (intra)  │  │          │  │          │
#       └──────────────────────┘  └──────────┘  └──────────┘
#                  └────────────┬─────────────────┘
#                  embedded NATS mesh on pgman-pc-net (node-X:6222)
#                                  │
#                   chaos-workload (HOST process)
#                   targets 127.0.0.1:1643{2,3,4}
#
# Architectural note: pgman-proxy embeds pg-manager, which OWNS the
# lifecycle of its colocated PostgreSQL (initdb, pg_basebackup, pg_ctl).
# Putting pgman-proxy and its pg in separate containers — as the
# previous host-process layout did — broke this assumption: pg-manager
# has no truly observe-only mode for postgres, and the host couldn't
# resolve the pg's shared-lib closure (libldap-2.5.so.0 etc.) on a
# non-Debian-12 host. Co-locating them removes the mismatch.
#
# Notes:
#   * Container names are prefixed `pgman-pc-*`; the network is
#     `pgman-pc-net`. Both are deleted on shutdown.
#   * Each container's PGDATA is bound to a named docker volume
#     (`pgman-pc-node-{a,b,c}-data`), so a single peer restart resumes
#     via WAL catch-up against its existing data instead of repeating
#     pg_basebackup. Volumes survive `process-compose down`; wipe them
#     manually for a true cold start:
#       docker volume rm pgman-pc-node-a-data pgman-pc-node-b-data pgman-pc-node-c-data
#   * The chaos-workload runs OUTSIDE docker as a host process; it
#     reaches the proxies through the per-peer host port mappings.
#
# Usage (requires the f1bonacc1/process-compose binary on PATH):
#
#   process-compose up               # interactive TUI
#   process-compose up --tui=false   # daemon mode
#   process-compose down             # stop processes (containers auto-rm)

version: "0.5"

# Cleanup hooks: even if a process exits cleanly, the docker network
# may stick around. The shutdown lifecycle removes it.
shutdown:
  command: |
    docker rm -f pgman-pc-node-a pgman-pc-node-b pgman-pc-node-c 2>/dev/null
    docker network rm pgman-pc-net 2>/dev/null
    true
  timeout_seconds: 30

environment:
  - "PGMAN_PROXY_CONTROL_TOKEN=process-compose-dev-token"

processes:

  # ───────────────────────────────────────────────────────────────────
  # network: shared docker network so the three peer containers reach
  # each other by name (node-a, node-b, node-c). Idempotent.
  # ───────────────────────────────────────────────────────────────────
  network:
    description: "create shared docker network"
    command: |
      docker network create pgman-pc-net 2>/dev/null
      true
    is_daemon: false
    availability:
      restart: "no"

  # ───────────────────────────────────────────────────────────────────
  # builder: build the pgman-proxy:dev image off the integration
  # Dockerfile (multi-stage: golang:1.25-bookworm builder → postgres:18
  # base with /usr/local/bin/pgman-proxy as the entrypoint). Build
  # context is the parent directory so COPY can pull in the sibling
  # ../pg-manager checkout that the `replace` directive in go.mod
  # points at.
  # ───────────────────────────────────────────────────────────────────
  builder:
    description: "docker build pgman-proxy:dev (pgman-proxy + pg18 in one image)"
    command: |
      docker build \
        --build-arg POSTGRES_VERSION=18 \
        -f tests/integration/Dockerfile \
        -t pgman-proxy:dev \
        ..
    working_dir: "."
    is_daemon: false
    availability:
      restart: "no"
    depends_on:
      network:
        condition: process_completed_successfully

  # ───────────────────────────────────────────────────────────────────
  # compile-chaos: build the chaos-workload binary on the host so it
  # can run as a host process (not in a container) and exercise the
  # proxy fleet through its per-peer host port mappings.
  # ───────────────────────────────────────────────────────────────────
  compile-chaos:
    description: "go build -> ./bin/chaos-workload (host binary)"
    command: |
      mkdir -p ./bin
      CGO_ENABLED=0 go build \
        -trimpath \
        -o ./bin/chaos-workload \
        ./cmd/chaos-workload
    working_dir: "."
    is_daemon: false
    availability:
      restart: "no"

  # ───────────────────────────────────────────────────────────────────
  # node-a / node-b / node-c — one container per peer. Each container
  # runs pgman-proxy as PID 1; pgman-proxy embeds pg-manager which
  # drives initdb / pg_basebackup / pg_ctl against the local PGDATA
  # at /var/lib/postgresql/data.
  #
  # Cluster substrate:
  #   * Embedded NATS (feature 002) runs in-process; peers mesh on
  #     TCP/6222 over the docker network using node-{b,c}:6222 etc.
  #   * Cluster ID `pgman-pc`, declared size 3.
  #   * TLS plaintext explicit-ack is enabled for dev simplicity.
  #
  # Data plane:
  #   * Proxy listener on 0.0.0.0:6432 inside the container, mapped
  #     to 127.0.0.1:1643{2,3,4} on the host.
  #   * Observability surface on 0.0.0.0:9090, mapped to
  #     127.0.0.1:1909{0,1,2}.
  #
  # PG-manager lifecycle:
  #   * BIN_DIR points at the in-image /usr/lib/postgresql/18/bin so
  #     pg_basebackup et al have their full shared-lib closure.
  #   * LOCAL_DSN connects via the in-image Unix socket
  #     /var/run/postgresql, sidestepping host-port-mapping noise.
  #   * HBA_EXTRAS adds the replication trust line that the integration
  #     test compose also relies on (DEMO ONLY — never use in prod).
  #
  # peerDSNResolver path: NOT used here. Peer IDs (node-a/b/c) resolve
  # as DNS names on pgman-pc-net, so the static PeerDSNs map (peer-id
  # as hostname) works without setting PGMAN_PROXY_POSTGRES_REPLICATION_ADDR.
  # ───────────────────────────────────────────────────────────────────
  node-a:
    description: "pgman-proxy + pg18 — node-a"
    command: |
      docker rm -f pgman-pc-node-a 2>/dev/null
      exec docker run --rm \
        --cap-add=NET_ADMIN \
        --name pgman-pc-node-a \
        --network pgman-pc-net \
        --network-alias node-a \
        -p 127.0.0.1:16432:6432 \
        -p 127.0.0.1:19090:9090 \
        -p 127.0.0.1:19191:9091 \
        -v pgman-pc-node-a-data:/var/lib/postgresql/data \
        -e PGMAN_PROXY_CLUSTER_ID=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_NAME=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_DECLARED_SIZE=3 \
        -e PGMAN_PROXY_NODE_ID=node-a \
        -e PGMAN_PROXY_PEERS=node-a,node-b,node-c \
        -e PGMAN_PROXY_CLUSTER_USERNAME=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_PASSWORD_ENV=PGMAN_CLUSTER_PASSWORD \
        -e PGMAN_CLUSTER_PASSWORD=process-compose-dev-cluster-secret \
        -e PGMAN_PROXY_CLUSTER_TLS_PLAINTEXT_EXPLICIT_ACK=true \
        -e PGMAN_PROXY_CLUSTER_CLIENT_LISTEN_PORT=4222 \
        -e PGMAN_PROXY_CLUSTER_ROUTES_LISTEN_PORT=6222 \
        -e PGMAN_PROXY_CLUSTER_JETSTREAM_DIR=/var/lib/postgresql/jetstream \
        -e PGMAN_PROXY_CLUSTER_ROUTE_PEERS=node-b:6222,node-c:6222 \
        -e PGMAN_PROXY_PROXY_LISTEN_ADDR=0.0.0.0:6432 \
        -e PGMAN_PROXY_OBS_HEALTH_ADDR=0.0.0.0:9090 \
        -e PGMAN_PROXY_OBS_LOG_LEVEL=info \
        -e PGMAN_PROXY_POSTGRES_BIN_DIR=/usr/lib/postgresql/18/bin \
        -e PGMAN_PROXY_POSTGRES_DATA_DIR=/var/lib/postgresql/data \
        -e PGMAN_PROXY_POSTGRES_LOCAL_DSN_ENV=LOCAL_DSN \
        -e "LOCAL_DSN=host=/var/run/postgresql user=postgres sslmode=disable" \
        -e PGMAN_PROXY_POSTGRES_LOCAL_PG_ADDR=node-a:5432 \
        -e PGMAN_PROXY_CONTROL_AUTH_TOKEN_ENV=PGMAN_PROXY_CONTROL_TOKEN \
        -e PGMAN_PROXY_CONTROL_TOKEN=process-compose-dev-token \
        -e PGMAN_PROXY_CONTROL_LISTEN_ADDR=0.0.0.0:9091 \
        -e PGMAN_PROXY_CONTROL_TLS_PLAINTEXT_EXPLICIT_ACK=true \
        -e "PGMAN_PROXY_POSTGRES_HBA_EXTRAS=host replication all 0.0.0.0/0 trust\nhost all         all 0.0.0.0/0 trust" \
        -e "PGMAN_PROXY_POSTGRES_CONF_EXTRAS=wal_keep_size = 128MB\nmax_slot_wal_keep_size = 16MB" \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_ENABLED=true \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_ENABLED=true \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_COOLDOWN=30s \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_LEADERSHIP_STABILITY_WINDOW=5s \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_COOLDOWN=30s \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_PERSISTENCE_WINDOW=10s \
        pgman-proxy:dev
    is_daemon: false
    availability:
      restart: "always"
    depends_on:
      builder:
        condition: process_completed_successfully
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 19090
        path: /readyz
        scheme: http
      initial_delay_seconds: 5
      period_seconds: 3
      failure_threshold: 60

  node-b:
    description: "pgman-proxy + pg18 — node-b"
    command: |
      docker rm -f pgman-pc-node-b 2>/dev/null
      exec docker run --rm \
        --cap-add=NET_ADMIN \
        --name pgman-pc-node-b \
        --network pgman-pc-net \
        --network-alias node-b \
        -p 127.0.0.1:16433:6432 \
        -p 127.0.0.1:19091:9090 \
        -p 127.0.0.1:19192:9091 \
        -v pgman-pc-node-b-data:/var/lib/postgresql/data \
        -e PGMAN_PROXY_CLUSTER_ID=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_NAME=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_DECLARED_SIZE=3 \
        -e PGMAN_PROXY_NODE_ID=node-b \
        -e PGMAN_PROXY_PEERS=node-a,node-b,node-c \
        -e PGMAN_PROXY_CLUSTER_USERNAME=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_PASSWORD_ENV=PGMAN_CLUSTER_PASSWORD \
        -e PGMAN_CLUSTER_PASSWORD=process-compose-dev-cluster-secret \
        -e PGMAN_PROXY_CLUSTER_TLS_PLAINTEXT_EXPLICIT_ACK=true \
        -e PGMAN_PROXY_CLUSTER_CLIENT_LISTEN_PORT=4222 \
        -e PGMAN_PROXY_CLUSTER_ROUTES_LISTEN_PORT=6222 \
        -e PGMAN_PROXY_CLUSTER_JETSTREAM_DIR=/var/lib/postgresql/jetstream \
        -e PGMAN_PROXY_CLUSTER_ROUTE_PEERS=node-a:6222,node-c:6222 \
        -e PGMAN_PROXY_PROXY_LISTEN_ADDR=0.0.0.0:6432 \
        -e PGMAN_PROXY_OBS_HEALTH_ADDR=0.0.0.0:9090 \
        -e PGMAN_PROXY_OBS_LOG_LEVEL=info \
        -e PGMAN_PROXY_POSTGRES_BIN_DIR=/usr/lib/postgresql/18/bin \
        -e PGMAN_PROXY_POSTGRES_DATA_DIR=/var/lib/postgresql/data \
        -e PGMAN_PROXY_POSTGRES_LOCAL_DSN_ENV=LOCAL_DSN \
        -e "LOCAL_DSN=host=/var/run/postgresql user=postgres sslmode=disable" \
        -e PGMAN_PROXY_POSTGRES_LOCAL_PG_ADDR=node-b:5432 \
        -e PGMAN_PROXY_CONTROL_AUTH_TOKEN_ENV=PGMAN_PROXY_CONTROL_TOKEN \
        -e PGMAN_PROXY_CONTROL_TOKEN=process-compose-dev-token \
        -e PGMAN_PROXY_CONTROL_LISTEN_ADDR=0.0.0.0:9091 \
        -e PGMAN_PROXY_CONTROL_TLS_PLAINTEXT_EXPLICIT_ACK=true \
        -e "PGMAN_PROXY_POSTGRES_HBA_EXTRAS=host replication all 0.0.0.0/0 trust\nhost all         all 0.0.0.0/0 trust" \
        -e "PGMAN_PROXY_POSTGRES_CONF_EXTRAS=wal_keep_size = 128MB\nmax_slot_wal_keep_size = 16MB" \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_ENABLED=true \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_ENABLED=true \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_COOLDOWN=30s \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_LEADERSHIP_STABILITY_WINDOW=5s \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_COOLDOWN=30s \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_PERSISTENCE_WINDOW=10s \
        pgman-proxy:dev
    is_daemon: false
    availability:
      restart: "always"
    depends_on:
      builder:
        condition: process_completed_successfully
      node-a:
        condition: process_started
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 19091
        path: /readyz
        scheme: http
      initial_delay_seconds: 5
      period_seconds: 3
      failure_threshold: 60

  node-c:
    description: "pgman-proxy + pg18 — node-c"
    command: |
      docker rm -f pgman-pc-node-c 2>/dev/null
      exec docker run --rm \
        --cap-add=NET_ADMIN \
        --name pgman-pc-node-c \
        --network pgman-pc-net \
        --network-alias node-c \
        -p 127.0.0.1:16434:6432 \
        -p 127.0.0.1:19092:9090 \
        -p 127.0.0.1:19193:9091 \
        -v pgman-pc-node-c-data:/var/lib/postgresql/data \
        -e PGMAN_PROXY_CLUSTER_ID=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_NAME=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_DECLARED_SIZE=3 \
        -e PGMAN_PROXY_NODE_ID=node-c \
        -e PGMAN_PROXY_PEERS=node-a,node-b,node-c \
        -e PGMAN_PROXY_CLUSTER_USERNAME=pgman-pc \
        -e PGMAN_PROXY_CLUSTER_PASSWORD_ENV=PGMAN_CLUSTER_PASSWORD \
        -e PGMAN_CLUSTER_PASSWORD=process-compose-dev-cluster-secret \
        -e PGMAN_PROXY_CLUSTER_TLS_PLAINTEXT_EXPLICIT_ACK=true \
        -e PGMAN_PROXY_CLUSTER_CLIENT_LISTEN_PORT=4222 \
        -e PGMAN_PROXY_CLUSTER_ROUTES_LISTEN_PORT=6222 \
        -e PGMAN_PROXY_CLUSTER_JETSTREAM_DIR=/var/lib/postgresql/jetstream \
        -e PGMAN_PROXY_CLUSTER_ROUTE_PEERS=node-a:6222,node-b:6222 \
        -e PGMAN_PROXY_PROXY_LISTEN_ADDR=0.0.0.0:6432 \
        -e PGMAN_PROXY_OBS_HEALTH_ADDR=0.0.0.0:9090 \
        -e PGMAN_PROXY_OBS_LOG_LEVEL=info \
        -e PGMAN_PROXY_POSTGRES_BIN_DIR=/usr/lib/postgresql/18/bin \
        -e PGMAN_PROXY_POSTGRES_DATA_DIR=/var/lib/postgresql/data \
        -e PGMAN_PROXY_POSTGRES_LOCAL_DSN_ENV=LOCAL_DSN \
        -e "LOCAL_DSN=host=/var/run/postgresql user=postgres sslmode=disable" \
        -e PGMAN_PROXY_POSTGRES_LOCAL_PG_ADDR=node-c:5432 \
        -e PGMAN_PROXY_CONTROL_AUTH_TOKEN_ENV=PGMAN_PROXY_CONTROL_TOKEN \
        -e PGMAN_PROXY_CONTROL_TOKEN=process-compose-dev-token \
        -e PGMAN_PROXY_CONTROL_LISTEN_ADDR=0.0.0.0:9091 \
        -e PGMAN_PROXY_CONTROL_TLS_PLAINTEXT_EXPLICIT_ACK=true \
        -e "PGMAN_PROXY_POSTGRES_HBA_EXTRAS=host replication all 0.0.0.0/0 trust\nhost all         all 0.0.0.0/0 trust" \
        -e "PGMAN_PROXY_POSTGRES_CONF_EXTRAS=wal_keep_size = 128MB\nmax_slot_wal_keep_size = 16MB" \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_ENABLED=true \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_ENABLED=true \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_COOLDOWN=30s \
        -e PGMAN_PROXY_POLICY_AUTO_DEMOTE_LEADERSHIP_STABILITY_WINDOW=5s \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_COOLDOWN=30s \
        -e PGMAN_PROXY_POLICY_AUTO_REBOOTSTRAP_PERSISTENCE_WINDOW=10s \
        pgman-proxy:dev
    is_daemon: false
    availability:
      restart: "always"
    depends_on:
      builder:
        condition: process_completed_successfully
      node-a:
        condition: process_started
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 19092
        path: /readyz
        scheme: http
      initial_delay_seconds: 5
      period_seconds: 3
      failure_threshold: 60

  # ───────────────────────────────────────────────────────────────────
  # chaos-workload: synthetic writer/reader. Inserts monotonically
  # numbered rows through the proxy fleet (multi-host DSN, libpq fails
  # over across all 3 peers) and periodically verifies every
  # acknowledged commit is still readable. A "DATA LOSS" log line means
  # the server told us a commit succeeded but the row is no longer
  # there — that's a real bug in the proxy or pg-manager.
  #
  # Runs as a HOST process (not in a container) so the operator can
  # easily inspect its log stream and tweak knobs without rebuilding.
  # The operator drives the chaos manually: kill -9 a peer container,
  # `process-compose stop node-X`, etc. Workload should keep running
  # and `data_loss_total` should stay 0.
  # ───────────────────────────────────────────────────────────────────
  chaos-workload:
    description: "synthetic writer/reader through proxy fleet (chaos verifier)"
    command: exec ./bin/chaos-workload
    working_dir: "."
    is_daemon: false
    availability:
      restart: "always"
    depends_on:
      compile-chaos:
        condition: process_completed_successfully
      node-a:
        condition: process_healthy
      node-b:
        condition: process_healthy
      node-c:
        condition: process_healthy
    environment:
      # connect_timeout=1 is libpq's minimum (integer seconds). The
      # writer's per-Exec budget is 5s by default — comfortably above
      # peers (3) * 1s, so a single black-holed peer port leaves >=2s
      # for the actual INSERT. See cmd/chaos-workload/budget_test.go.
      - "CHAOS_DSN=host=127.0.0.1,127.0.0.1,127.0.0.1 port=16432,16433,16434 user=postgres dbname=postgres sslmode=disable connect_timeout=1"
