# Reference 3-peer pgman-proxy topology in front of a 3-node pg-manager
# cluster.
#
# Feature 002 (specs/002-embedded-nats-cluster/): NATS is embedded in
# every pgman-proxy peer; there is no external `nats` service. The
# peers mesh into a NATS cluster on TCP/6222 between containers.
#
# Out of scope for this project: Kubernetes/Helm/operator artefacts (FR-015).

services:
  pg-a:
    image: postgres:17
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pg-a-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  pg-b:
    image: postgres:17
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pg-b-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  pg-c:
    image: postgres:17
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pg-c-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  pgman-proxy-a:
    image: ghcr.io/f1bonacc1/pgman-proxy:latest
    depends_on: [pg-a]
    environment:
      PGMAN_PROXY_CLUSTER_ID: demo
      PGMAN_PROXY_NODE_ID: node-a
      PGMAN_PROXY_PEERS: node-a,node-b,node-c
      PGMAN_PROXY_PROXY_LISTEN_ADDR: 0.0.0.0:6432
      PGMAN_PROXY_POSTGRES_BIN_DIR: /usr/lib/postgresql/17/bin
      PGMAN_PROXY_POSTGRES_DATA_DIR: /var/lib/postgresql/data
      LOCAL_DSN: host=pg-a port=5432 user=postgres sslmode=disable
    ports:
      - "6432:6432"
      - "9090:9090"
      - "9091:9091"
      - "6222:6222" # cluster-routes listener (feature 002)

  pgman-proxy-b:
    image: ghcr.io/f1bonacc1/pgman-proxy:latest
    depends_on: [pg-b]
    environment:
      PGMAN_PROXY_CLUSTER_ID: demo
      PGMAN_PROXY_NODE_ID: node-b
      PGMAN_PROXY_PEERS: node-a,node-b,node-c
      PGMAN_PROXY_PROXY_LISTEN_ADDR: 0.0.0.0:6432
      PGMAN_PROXY_POSTGRES_BIN_DIR: /usr/lib/postgresql/17/bin
      PGMAN_PROXY_POSTGRES_DATA_DIR: /var/lib/postgresql/data
      LOCAL_DSN: host=pg-b port=5432 user=postgres sslmode=disable
    ports:
      - "6433:6432"
      - "6223:6222" # cluster-routes listener (feature 002)

  pgman-proxy-c:
    image: ghcr.io/f1bonacc1/pgman-proxy:latest
    depends_on: [pg-c]
    environment:
      PGMAN_PROXY_CLUSTER_ID: demo
      PGMAN_PROXY_NODE_ID: node-c
      PGMAN_PROXY_PEERS: node-a,node-b,node-c
      PGMAN_PROXY_PROXY_LISTEN_ADDR: 0.0.0.0:6432
      PGMAN_PROXY_POSTGRES_BIN_DIR: /usr/lib/postgresql/17/bin
      PGMAN_PROXY_POSTGRES_DATA_DIR: /var/lib/postgresql/data
      LOCAL_DSN: host=pg-c port=5432 user=postgres sslmode=disable
    ports:
      - "6434:6432"
      - "6224:6222" # cluster-routes listener (feature 002)

volumes:
  pg-a-data:
  pg-b-data:
  pg-c-data:
