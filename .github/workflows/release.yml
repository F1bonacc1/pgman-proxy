# Release pgman-proxy and pgmctl binaries via GoReleaser.
#
# Triggers:
#   - push tag matching v* — release builds (creates draft GitHub release)
#   - workflow_dispatch — manual snapshot builds (no release, just artifacts)
#
# Produces:
#   - pgman-proxy static binaries (linux/amd64, linux/arm64)
#   - pgmctl static binaries (linux+darwin / amd64+arm64)
#   - tar.gz archives + checksums
#   - Multi-arch distroless OCI image on GHCR (pgman-proxy only)

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pg-manager is required by the go.mod replace directive.
      # Checked out inside the workspace; the replace path is patched below.
      - uses: actions/checkout@v4
        with:
          repository: F1bonacc1/pg-manager
          path: pg-manager
          fetch-depth: 1
          token: ${{ secrets.PG_MANAGER_TOKEN || github.token }}

      # The go.mod has `replace ../pg-manager`; rewrite to ./pg-manager
      # since GitHub Actions checks out both repos under the workspace root.
      # Then hide both changes from git so GoReleaser sees a clean tree.
      - name: Patch go.mod replace directive
        run: |
          sed -i 's|=> \.\./pg-manager|=> ./pg-manager|' go.mod
          echo "pg-manager/" >> .gitignore
          git update-index --assume-unchanged go.mod

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: >-
            release
            ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
            --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
