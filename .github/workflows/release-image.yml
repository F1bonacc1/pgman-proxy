# Build the production bundled image (pgman-proxy + pg18) and push
# it to ghcr.io. Two triggers:
#
#   - workflow_dispatch — manual ad-hoc builds, e.g. when iterating on
#     the Dockerfile. Tagged as `:edge-<sha>` and `:edge` (overwrites).
#   - push tag matching v* — release builds. Tagged as `:vX.Y.Z`,
#     `:vX.Y`, and `:latest`.
#
# Multi-arch (linux/amd64, linux/arm64) via QEMU. The build context holds
# only pgman-proxy/. The pinned, private pg-manager module is fetched inside
# the build via a BuildKit secret mount (PG_MANAGER_TOKEN) — see
# deploy/docker/Dockerfile.bundle.

name: release-image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Override the tag suffix for an ad-hoc dispatch build (default: edge)."
        required: false
        default: "edge"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: f1bonacc1/pgman-proxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed by git describe --tags
          path: pgman-proxy

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive build args
        id: vars
        working-directory: pgman-proxy
        run: |
          set -euo pipefail
          version="$(git describe --tags --always --dirty)"
          commit="$(git rev-parse --short HEAD)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit"   >> "$GITHUB_OUTPUT"

      # `docker/metadata-action` does the tag math: semver decomposition
      # for `v*` tags, `:edge[-sha]` for workflow_dispatch, and the
      # standard OCI labels.
      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag_suffix || 'edge' }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=${{ inputs.tag_suffix || 'edge' }}-,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=pgman-proxy
            org.opencontainers.image.description=Active/active PostgreSQL HA proxy + lifecycle manager bundled with PostgreSQL 18
            org.opencontainers.image.licenses=Apache-2.0

      - name: build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pgman-proxy/deploy/docker/Dockerfile.bundle
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ steps.vars.outputs.commit }}
          secrets: |
            pgm_token=${{ secrets.PG_MANAGER_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
