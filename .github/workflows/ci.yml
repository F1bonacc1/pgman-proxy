# Primary CI: build / lint / unit + smoke tests on every PR. Integration
# tests (`make integration`) require docker-compose and run on a
# separate workflow with a longer timeout — kept out of this gate so
# the per-PR feedback loop stays fast.

name: ci
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: build / vet / test / lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/f1bonacc1/*
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: pgman-proxy

      # pgman-proxy/go.mod pins the private module
      # github.com/f1bonacc1/pg-manager. Authenticate the Go toolchain's git
      # fetch with PG_MANAGER_TOKEN — a repo secret holding a PAT (or
      # fine-grained token) with contents:read on f1bonacc1/pg-manager.
      # (The default GITHUB_TOKEN cannot read other private repos.)
      - name: Authenticate private module fetch
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.PG_MANAGER_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version-file: pgman-proxy/go.mod
          cache-dependency-path: pgman-proxy/go.sum

      - name: build
        working-directory: pgman-proxy
        run: go build ./...

      - name: vet
        working-directory: pgman-proxy
        run: go vet ./...

      - name: test (race + coverage)
        working-directory: pgman-proxy
        run: go test -race -count=1 -coverprofile=coverage.out ./internal/...

      - name: smoke
        working-directory: pgman-proxy
        run: go test -tags=smoke -count=1 -timeout=5m ./tests/smoke/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Pin a recent v2.x release built with go1.26+; older releases
          # (v2.0.0 was built with go1.24) refuse configs that target a
          # higher language version than the linter itself was built
          # with. Bump when the project's go directive moves.
          version: latest
          working-directory: pgman-proxy
