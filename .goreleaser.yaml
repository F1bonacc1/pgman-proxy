# goreleaser config for pgman-proxy.
# Produces static linux/amd64 + linux/arm64 binaries and a distroless OCI image.

version: 2

project_name: pgman-proxy

before:
  hooks:
    - go mod download

builds:
  - id: pgman-proxy
    main: ./cmd/pgman-proxy
    binary: pgman-proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: tarball
    format: tar.gz
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"

dockers:
  - image_templates:
      - "ghcr.io/f1bonacc1/pgman-proxy:{{.Version}}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/f1bonacc1/pgman-proxy"
      - "--label=org.opencontainers.image.version={{.Version}}"
  - image_templates:
      - "ghcr.io/f1bonacc1/pgman-proxy:{{.Version}}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/f1bonacc1/pgman-proxy"
      - "--label=org.opencontainers.image.version={{.Version}}"

docker_manifests:
  - name_template: "ghcr.io/f1bonacc1/pgman-proxy:{{.Version}}"
    image_templates:
      - "ghcr.io/f1bonacc1/pgman-proxy:{{.Version}}-amd64"
      - "ghcr.io/f1bonacc1/pgman-proxy:{{.Version}}-arm64"

checksum:
  name_template: "checksums.txt"

release:
  draft: true
